<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1e2a3d">
<link rel="icon" href="icon.png">
<title>Send URL to VLC TV</title>
<style>
  /* Palette + type lifted straight from the app (tizen-web-vlc/css/style.css) */
  :root {
    --bg:        #1e2a3d;
    --bg-2:      #283549;
    --bg-card:   #2a3854;
    --bg-card-h: #3a4a6a;
    --fg:        #ffffff;
    --fg-mute:   #d0dae5;
    --fg-dim:    #8da0b8;
    --accent:    #4fc3f7;
    --accent-2:  #81d4fa;
    --accent-soft: rgba(79,195,247,.18);
    --danger:    #ff6b6b;
    --border:    rgba(255,255,255,.08);
    --shadow:    0 8px 32px rgba(0,0,0,.45);
    --r:         16px;
    --r-sm:      10px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; min-height: 100dvh;
    padding: env(safe-area-inset-top) 18px calc(env(safe-area-inset-bottom) + 18px);
  }
  code, .mono { font-family: 'Consolas', ui-monospace, monospace; }

  /* Brand header — icon top-left, wordmark beside it (matches app .brand) */
  header { display: flex; align-items: center; gap: 16px; padding: 22px 2px 18px; }
  .cone-img { width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0; box-shadow: var(--shadow); }
  header h1 { margin: 0; font-size: 26px; font-weight: 200; letter-spacing: 1px; color: var(--fg); }
  header h1 span { color: var(--accent); font-weight: 600; margin-left: 6px; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--r); box-shadow: var(--shadow);
    padding: 20px; margin-bottom: 14px;
  }
  label {
    display: block; font-size: 13px; color: var(--fg-mute);
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
  }
  input {
    width: 100%; background: var(--bg-2); border: 2px solid var(--border);
    border-radius: var(--r-sm); color: var(--fg); padding: 14px; font-size: 17px;
    transition: border-color .15s ease, background .15s ease;
  }
  input::placeholder { color: var(--fg-dim); }
  input:focus { outline: none; border-color: var(--accent); background: var(--bg-card-h); }
  #code { font-family: 'Consolas', monospace; letter-spacing: 3px; text-align: center; }
  #url  { font-family: 'Consolas', monospace; margin-top: 4px; }

  /* Pill buttons (matches app .btn) */
  button {
    font: inherit; cursor: pointer; border: 3px solid transparent;
    border-radius: 999px; transition: background .15s ease, border-color .15s ease, transform .1s ease, box-shadow .15s ease;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .45; }
  .btn-primary {
    width: 100%; margin-top: 16px; padding: 16px; font-size: 18px; font-weight: 600;
    background: var(--accent); color: #102035;
  }
  .btn-primary:not(:disabled):active { background: var(--accent-2); box-shadow: 0 0 0 6px var(--accent-soft); }
  .btn-ghost { background: var(--bg-2); color: var(--fg); border-color: var(--border); }

  .row { display: flex; gap: 10px; align-items: stretch; }
  .row .grow { flex: 1; min-width: 0; }
  .savebtn { padding: 0 22px; font-size: 15px; }

  #status { margin: 14px 2px 0; font-size: 14px; min-height: 20px; }
  #status.ok  { color: var(--accent); }
  #status.bad { color: var(--danger); }
  .hint { color: var(--fg-dim); font-size: 13px; line-height: 1.55; margin: 8px 2px 0; }
  .hint b { color: var(--fg-mute); font-weight: 600; }

  footer { margin-top: auto; padding-top: 18px; text-align: center; color: var(--fg-dim); font-size: 12px; }
</style>
</head>
<body>
  <header>
    <img class="cone-img" src="icon.png" alt="VLC TV">
    <h1>Send to<span>VLC&nbsp;TV</span></h1>
  </header>

  <section class="card">
    <label for="code">Pairing code (shown on your TV)</label>
    <div class="row">
      <div class="grow">
        <input id="code" inputmode="text" autocomplete="off" spellcheck="false" placeholder="paste your code">
      </div>
      <button class="btn-ghost savebtn" id="savecode" type="button">Save</button>
    </div>
    <p class="hint">On the TV: <b>Open Network Stream &rarr; Get URL from device</b>. The code is shown there. You only enter it once.</p>
  </section>

  <section class="card">
    <label for="url">Stream URL</label>
    <input id="url" type="url" inputmode="url" autocomplete="off" spellcheck="false"
           placeholder="https://&hellip; &middot; rtsp://&hellip; &middot; &hellip;/playlist.m3u8">
    <button class="btn-primary" id="send" type="button">Send to TV</button>
    <p id="status"></p>
    <p class="hint">After sending, press <b>Get URL from device</b> on the TV to play it.</p>
  </section>

  <footer>no app, no account &mdash; uses ntfy.sh</footer>

<script>
(function () {
  'use strict';
  var $ = function (id) { return document.getElementById(id); };
  var NTFY = 'https://ntfy.sh';
  var LS_CODE = 'vlctv_drop_code';

  var fromHash = (location.hash || '').replace('#', '').trim();
  var saved = '';
  try { saved = localStorage.getItem(LS_CODE) || ''; } catch (e) {}
  var initial = fromHash || saved;
  if (initial) $('code').value = initial;

  function persist(code) { try { localStorage.setItem(LS_CODE, code); } catch (e) {} }
  function setStatus(text, kind) { var el = $('status'); el.textContent = text || ''; el.className = kind || ''; }

  $('savecode').addEventListener('click', function () {
    var c = ($('code').value || '').trim();
    if (!c) { $('code').focus(); return; }
    persist(c); setStatus('Code saved', 'ok');
  });

  function send() {
    var code = ($('code').value || '').trim();
    var url  = ($('url').value || '').trim();
    if (!code) { setStatus('Enter the pairing code first', 'bad'); $('code').focus(); return; }
    if (!url)  { setStatus('Paste a URL first', 'bad'); $('url').focus(); return; }
    persist(code); setStatus('Sending\u2026', ''); $('send').disabled = true;
    fetch(NTFY + '/' + encodeURIComponent('vlctv-' + code), {
      method: 'POST', body: url, headers: { 'Title': 'VLC TV URL' }
    })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status);
      setStatus('Sent \u2014 now press \u201CGet URL from device\u201D on the TV', 'ok'); })
    .catch(function (e) { setStatus('Failed to send (' + e.message + ')', 'bad'); })
    .then(function () { $('send').disabled = false; });
  }
  $('send').addEventListener('click', send);
  $('url').addEventListener('keydown', function (e) { if (e.key === 'Enter') send(); });

  var qUrl = new URLSearchParams(location.search).get('url');
  if (qUrl) $('url').value = qUrl;
})();
</script>
</body>
</html>
